<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gonzalz Humo - Ejercicio28</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: sans-serif;
      background-color: #f5f3ff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .conv-wrap {
      max-width: 420px;
      width: 100%;
      padding: 2rem;
      background: #ffffff;
      border: 1px solid #c4b5fd;
      border-radius: 12px;
    }

    .conv-title {
      font-size: 20px;
      font-weight: 500;
      color: #4c1d95;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .conv-label {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 6px;
      display: block;
    }

    .conv-input-wrap {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 1.25rem;
    }

    .conv-input-wrap input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #c4b5fd;
      border-radius: 8px;
      font-size: 15px;
      background: #faf5ff;
      color: #1f2937;
      outline: none;
    }

    .conv-input-wrap input:focus {
      box-shadow: 0 0 0 3px #d8b4fe55;
      border-color: #a78bfa;
    }

    .conv-btn {
      padding: 10px 20px;
      background: #e9d5ff;
      color: #5b21b6;
      border: 1px solid #c4b5fd;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .conv-btn:hover {
      background: #ddd6fe;
    }

    .conv-btn:active {
      transform: scale(0.98);
    }

    .conv-result {
      margin-top: 1.25rem;
      padding: 1rem 1.25rem;
      background: #f5f3ff;
      border: 1px solid #c4b5fd;
      border-radius: 8px;
      text-align: center;
      display: none;
    }

    .conv-result-text {
      font-size: 16px;
      font-weight: 500;
      color: #5b21b6;
    }

    .conv-formula {
      font-size: 12px;
      color: #7c3aed;
      margin-top: 6px;
    }

    .conv-error {
      margin-top: 1rem;
      padding: 10px 14px;
      background: #fce7f3;
      border: 1px solid #f9a8d4;
      border-radius: 8px;
      font-size: 13px;
      color: #9d174d;
      display: none;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="conv-wrap">
    <p class="conv-title">Convertidor de temperatura</p>

    <label class="conv-label" for="celsiusInput">Temperatura en Celsius</label>
    <div class="conv-input-wrap">
      <input type="number" id="celsiusInput" placeholder="ej. 25" step="any" />
      <button class="conv-btn" onclick="convertir()">Convertir</button>
    </div>

    <div class="conv-result" id="resultBox">
      <div class="conv-result-text" id="resultText"></div>
      <div class="conv-formula" id="formulaText"></div>
    </div>

    <div class="conv-error" id="errorBox">
      Por favor ingresa un número válido.
    </div>
  </div>

  <script>
    function convertir() {
      const input = document.getElementById('celsiusInput').value.trim();
      const resultBox = document.getElementById('resultBox');
      const errorBox = document.getElementById('errorBox');
      const resultText = document.getElementById('resultText');
      const formulaText = document.getElementById('formulaText');

      resultBox.style.display = 'none';
      errorBox.style.display = 'none';

      if (input === '' || isNaN(Number(input))) {
        errorBox.style.display = 'block';
        return;
      }

      const celsius = Number(input);
      const fahrenheit = celsius * 9 / 5 + 32;
      const fDisplay = parseFloat(fahrenheit.toFixed(1));

      resultText.textContent = celsius + ' Celsius = ' + fDisplay + ' Fahrenheit';
      formulaText.textContent = celsius + ' × 9/5 + 32 = ' + fDisplay;
      resultBox.style.display = 'block';
    }

    document.getElementById('celsiusInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') convertir();
    });
  </script>

</body>
</html>
